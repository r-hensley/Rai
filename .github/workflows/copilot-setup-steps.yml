name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          # Update this to point at all requirements files you want to cache on
          cache-dependency-path: |
            requirements.txt
            requirements-test.txt

      - name: Configure submodule URL auth for Actions
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Initialize submodules
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Install runtime and test dependencies
        run: python -m pip install -r requirements.txt -r requirements-test.txt

      - name: Pre-create .env for test imports
        run: |
          if [ ! -f .env ]; then
            {
              echo "BOT_TOKEN=dummy"
              echo "TRACEBACK_LOGGING_CHANNEL=0"
              echo "BOT_TEST_CHANNEL=0"
              echo "OWNER_ID=0"
              echo "GCSE_API="
            } > .env
          fi

      - name: Validate repository tests command
        run: python -m pytest tests

      - name: Show pip cache info
        run: pip cache dir
