{% extends "base.html" %}
{% block content %}
<section class="status-band status-ok">
  <div class="status-copy">
    <span class="status-label"><span class="status-dot"></span>Authorized servers</span>
    <h2>Select a server configuration.</h2>
  </div>
</section>

<section class="panel">
  <div class="section-heading"><h2>Servers</h2></div>
  <div class="settings-server-list">
    {% for guild in guilds %}
    <a href="/settings/{{ guild.id }}">
      <strong>{{ guild.name }}</strong>
      <span>{{ "Editable" if guild.can_edit else "Read-only" }}</span>
    </a>
    {% else %}
    <p class="empty-state">No authorized servers are currently visible to Rai.</p>
    {% endfor %}
  </div>
</section>
{% endblock %}
